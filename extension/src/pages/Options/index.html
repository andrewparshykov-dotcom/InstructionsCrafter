<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InstructionsCrafter — Options</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 24px; max-width: 520px; color: #222; }
      h1 { font-size: 18px; margin: 0 0 16px; }
      label { display: block; font-weight: 600; margin-top: 16px; }
      input { width: 100%; padding: 8px; margin-top: 4px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
      .help { color: #666; font-size: 12px; margin-top: 4px; }
      .actions { margin-top: 24px; display: flex; align-items: center; gap: 12px; }
      button { padding: 8px 16px; font-size: 14px; cursor: pointer; border: 1px solid #888; background: #f6f6f6; border-radius: 4px; }
      button:hover { background: #eee; }
      .status { color: #2a7; font-weight: 600; min-height: 18px; }
    </style>
  </head>
  <body>
    <h1>InstructionsCrafter — Options</h1>

    <label for="backendUrl">Backend URL</label>
    <input type="url" id="backendUrl" placeholder="http://127.0.0.1:8000" />
    <p class="help">URL of the InstructionsCrafter backend. Defaults to the local development server.</p>

    <label for="defaultTitle">Default document title (optional)</label>
    <input type="text" id="defaultTitle" placeholder="e.g. How to reset a password" />
    <p class="help">Pre-fills the title field when you generate a document. Leave blank to type a fresh title each time.</p>

    <div class="actions">
      <button id="save">Save</button>
      <span class="status" id="status"></span>
    </div>
  </body>
</html>
