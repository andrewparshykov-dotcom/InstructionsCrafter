<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>InstructionsCrafter — Recorder</title>
    <link rel="stylesheet" href="chrome-extension://__MSG_@@extension_id__/assets/fonts/editorial-manual.css" />
    <style>
      body {
        margin: 0;
        font-family: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
    </style>
    <!--
      Webpack injects two <script defer> tags (chunks: ["recorderkeepalive",
      "recorder"], chunksSortMode: "manual"):
        1. recorderkeepalive.bundle.js: audio oscillator + Web Locks +
           mediaSession signals to prevent hidden-tab throttling.
        2. recorder.bundle.js: the React app.
      Both deferred; document-order execution keeps signals in place
      before the recorder bundle parses.
    -->
  </head>

  <body>
    <div id="app-container"></div>
  </body>
</html>
