<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>InstructionsCrafter — Recorder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        font-family: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
    </style>
    <!--
      Webpack injects two <script defer> tags (chunks: ["recorderkeepalive",
      "recorder"], chunksSortMode: "manual"):
        1. recorderkeepalive.bundle.js: audio oscillator + Web Locks +
           mediaSession signals to prevent hidden-tab throttling.
        2. recorder.bundle.js: the React app.
      Both deferred; document-order execution keeps signals in place
      before the recorder bundle parses.
    -->
  </head>

  <body>
    <div id="app-container"></div>
  </body>
</html>
